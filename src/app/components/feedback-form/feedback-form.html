<div class="form-card">
    <h2 class="form-title">Send Feedback</h2>
    <p class="form-subtitle">We'd love to hear what you think about EchoBlue</p>

    <!-- Success banner -->
    <div *ngIf="feedbackSent" class="success-banner">
        ✅ Thank you! Your feedback has been sent.
    </div>

    <form #feedbackFormRef="ngForm" (ngSubmit)="onSubmit(feedbackFormRef)" novalidate>

        <!-- Name -->
        <div class="field">
            <label class="label" for="fb-name">Name</label>
            <input class="input" id="fb-name" type="text" name="name" placeholder="Your name"
                [(ngModel)]="feedback.name" required #nameCtrl="ngModel"
                [class.invalid]="nameCtrl.invalid && (nameCtrl.touched || submitted)" />
            <div class="errors" *ngIf="nameCtrl.invalid && (nameCtrl.touched || submitted)">
                <span *ngIf="nameCtrl.errors?.['required']">Name is required.</span>
            </div>
        </div>

        <!-- Email -->
        <div class="field">
            <label class="label" for="fb-email">Email</label>
            <input class="input" id="fb-email" type="email" name="email" placeholder="you@example.com"
                [(ngModel)]="feedback.email" required email #emailCtrl="ngModel"
                [class.invalid]="emailCtrl.invalid && (emailCtrl.touched || submitted)" />
            <div class="errors" *ngIf="emailCtrl.invalid && (emailCtrl.touched || submitted)">
                <span *ngIf="emailCtrl.errors?.['required']">Email is required.</span>
                <span *ngIf="emailCtrl.errors?.['email']">Please enter a valid email address.</span>
            </div>
        </div>

        <!-- Rating -->
        <div class="field">
            <label class="label" for="fb-rating">Rating</label>
            <div class="rating-row">
                <input class="range-input" id="fb-rating" type="range" name="rating" min="1" max="10"
                    [(ngModel)]="feedback.rating" />
                <span class="rating-value">{{ feedback.rating }} / 10</span>
            </div>
        </div>

        <!-- Message -->
        <div class="field">
            <label class="label" for="fb-message">Message</label>
            <textarea class="input textarea" id="fb-message" name="message" placeholder="Tell us what you think…"
                rows="4" [(ngModel)]="feedback.message" required minlength="10" #msgCtrl="ngModel"
                [class.invalid]="msgCtrl.invalid && (msgCtrl.touched || submitted)"></textarea>
            <div class="errors" *ngIf="msgCtrl.invalid && (msgCtrl.touched || submitted)">
                <span *ngIf="msgCtrl.errors?.['required']">Message is required.</span>
                <span *ngIf="msgCtrl.errors?.['minlength']">
                    Message must be at least 10 characters.
                </span>
            </div>
        </div>

        <!-- Submit -->
        <button class="submit-btn" type="submit" [disabled]="feedbackFormRef.invalid && submitted">
            Send Feedback
        </button>
    </form>
</div>
