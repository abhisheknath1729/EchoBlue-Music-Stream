<div class="form-card">
    <h2 class="form-title">Sign In to EchoBlue</h2>
    <p class="form-subtitle">Enter your credentials to continue</p>

    <!-- Success banner -->
    <div *ngIf="loginSuccess" class="success-banner">
        ✅ Login successful! Welcome back.
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate>

        <!-- Email -->
        <div class="field">
            <label class="label" for="login-email">Email</label>
            <input class="input" id="login-email" type="email" name="email" placeholder="you@example.com"
                [(ngModel)]="credentials.email" required email #emailCtrl="ngModel"
                [class.invalid]="emailCtrl.invalid && (emailCtrl.touched || submitted)" />
            <div class="errors" *ngIf="emailCtrl.invalid && (emailCtrl.touched || submitted)">
                <span *ngIf="emailCtrl.errors?.['required']">Email is required.</span>
                <span *ngIf="emailCtrl.errors?.['email']">Please enter a valid email address.</span>
            </div>
        </div>

        <!-- Password -->
        <div class="field">
            <label class="label" for="login-password">Password</label>
            <input class="input" id="login-password" type="password" name="password" placeholder="••••••••"
                [(ngModel)]="credentials.password" required minlength="6" #passCtrl="ngModel"
                [class.invalid]="passCtrl.invalid && (passCtrl.touched || submitted)" />
            <div class="errors" *ngIf="passCtrl.invalid && (passCtrl.touched || submitted)">
                <span *ngIf="passCtrl.errors?.['required']">Password is required.</span>
                <span *ngIf="passCtrl.errors?.['minlength']">
                    Password must be at least 6 characters.
                </span>
            </div>
        </div>

        <!-- Submit -->
        <button class="submit-btn" type="submit" [disabled]="loginForm.invalid && submitted">
            Sign In
        </button>
    </form>
</div>
